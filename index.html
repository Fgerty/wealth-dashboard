<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Architect Pro - Professional Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .main-container { max-width: 1920px; margin: 0 auto; padding: 24px; }
        .sync-height-top { height: 600px; }
        .sync-height-bottom { height: 450px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        #addBtn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="p-2">

    <div class="main-container">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
            <div class="flex items-center gap-6">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter text-slate-900 uppercase italic">Wealth<span class="text-indigo-600">Architect</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 tracking-[0.2em]">HORIZONTAL FLOW | DATA PERSISTENT</p>
                </div>
                <button onclick="resetToDefaults()" class="px-4 py-2 bg-slate-100 hover:bg-red-50 text-slate-500 hover:text-red-600 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border border-slate-200">
                    Reset All Data
                </button>
            </div>
            
            <div class="flex items-center gap-10">
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-400 uppercase mb-1">Time Horizon (Years)</span>
                    <div class="flex items-center gap-3 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                        <input type="range" id="globalYearsRange" min="1" max="1000" value="40" class="w-40 h-1.5 accent-indigo-600" oninput="syncTimeline(this.value, 'num')">
                        <input type="number" id="globalYearsNum" min="1" max="1000" value="40" class="w-20 bg-transparent text-center font-bold text-indigo-600 text-sm outline-none" oninput="syncTimeline(this.value, 'range')">
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-400 uppercase mb-1">Target Goal</span>
                    <input type="number" id="wealthGoal" value="1000000" class="bg-slate-50 border rounded-xl px-4 py-1.5 text-xs font-bold w-36 outline-none focus:ring-2 ring-indigo-500" oninput="updateAll()">
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-black text-slate-400 uppercase mb-1">Inflation %</span>
                    <div class="flex items-center gap-2">
                        <input type="number" id="inflationRate" value="3.0" step="0.1" class="bg-slate-50 border rounded-xl px-3 py-1.5 text-xs font-bold w-16 outline-none" oninput="updateAll()">
                        <input type="checkbox" id="inflationToggle" class="w-5 h-5 accent-indigo-600" checked onchange="updateAll()">
                        <span class="text-[10px] font-bold text-slate-600 uppercase">Apply</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-8 mb-8">
            <div class="col-span-4 bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 sync-height-top flex flex-col">
                <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Investment Scenarios</h2>
                <div id="portfolioList" class="flex-grow overflow-y-auto pr-3 custom-scrollbar space-y-4"></div>
                <button onclick="addPortfolio()" id="addBtn" class="w-full mt-6 py-4 border-2 border-dashed border-slate-200 hover:border-indigo-400 text-slate-400 hover:text-indigo-600 rounded-2xl font-bold text-xs uppercase tracking-widest">Add New Scenario</button>
            </div>

            <div class="col-span-8 bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 sync-height-top flex flex-col">
                <div class="relative w-full flex-grow min-h-0">
                    <canvas id="compChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-8">
            <div class="col-span-6 bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden sync-height-bottom flex flex-col">
                <div class="overflow-y-auto flex-grow custom-scrollbar">
                    <table class="w-full text-left text-[11px]">
                        <thead class="bg-slate-50 text-slate-400 font-black uppercase tracking-widest border-b sticky top-0 z-10">
                            <tr>
                                <th class="px-6 py-5">Scenario</th>
                                <th class="px-2 py-5 text-center">Active</th>
                                <th class="px-4 py-5 text-center">Interest Gained (%)</th>
                                <th class="px-4 py-5 text-center">Years to Goal</th>
                                <th class="px-6 py-5 text-right">Wealth</th>
                                <th class="px-6 py-5 text-right">Return Ratio</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody" class="divide-y divide-slate-50 font-bold"></tbody>
                    </table>
                </div>
            </div>

            <div class="col-span-2 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 flex flex-col items-center sync-height-bottom">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 shrink-0">Interest Proportion</h3>
                <div id="pieContainer" class="flex flex-col gap-4 overflow-y-auto custom-scrollbar w-full items-center"></div>
            </div>

            <div class="col-span-4 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 flex flex-col sync-height-bottom">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 text-center shrink-0">ROI vs Duration Matrix</h3>
                <div class="relative w-full flex-grow min-h-0">
                    <canvas id="bubbleChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart, bubbleChartInstance;
        let pieCharts = [];
        const palette = ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#06b6d4', '#8b5cf6', '#ec4899', '#f97316', '#14b8a6', '#6366f1'];

        const DEFAULT_PORTFOLIOS = [
            { id: 1, name: 'Base Plan', initial: 10000, monthly: 500, roi: 7, startYear: 0, color: palette[0] }
        ];

        let portfolios = [];

        function saveToStorage() {
            const data = {
                portfolios,
                config: {
                    years: document.getElementById('globalYearsNum').value,
                    goal: document.getElementById('wealthGoal').value,
                    inflation: document.getElementById('inflationRate').value,
                    infToggle: document.getElementById('inflationToggle').checked
                }
            };
            localStorage.setItem('wealthArchitectData', JSON.stringify(data));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('wealthArchitectData');
            if (saved) {
                const parsed = JSON.parse(saved);
                portfolios = parsed.portfolios;
                document.getElementById('globalYearsNum').value = parsed.config.years;
                document.getElementById('globalYearsRange').value = parsed.config.years;
                document.getElementById('wealthGoal').value = parsed.config.goal;
                document.getElementById('inflationRate').value = parsed.config.inflation;
                document.getElementById('inflationToggle').checked = parsed.config.infToggle;
            } else {
                portfolios = JSON.parse(JSON.stringify(DEFAULT_PORTFOLIOS));
            }
        }

        function resetToDefaults() {
            if (confirm("Reset all data?")) {
                localStorage.removeItem('wealthArchitectData');
                location.reload();
            }
        }

        function syncTimeline(val, target) {
            let cleanVal = Math.min(1000, Math.max(1, parseInt(val) || 1));
            document.getElementById('globalYearsRange').value = cleanVal;
            document.getElementById('globalYearsNum').value = cleanVal;
            updateAll();
        }

        function addPortfolio() {
            if (portfolios.length >= 10) return;
            const color = palette[portfolios.length % palette.length];
            portfolios.push({ id: Date.now(), name: `Plan ${portfolios.length + 1}`, initial: 5000, monthly: 200, roi: 8, startYear: 0, color: color });
            renderControls(); 
            updateAll();
        }

        function removePortfolio(id) {
            if (id === 1 || portfolios.length <= 1) return;
            portfolios = portfolios.filter(p => p.id !== id);
            renderControls(); 
            updateAll();
        }

        function updateVal(id, field, val) {
            const p = portfolios.find(p => p.id === id);
            p[field] = (field === 'name') ? val : parseFloat(val) || 0;
            updateAll();
        }

        function renderControls() {
            const container = document.getElementById('portfolioList');
            container.innerHTML = '';
            portfolios.forEach((p) => {
                const isBasePlan = p.id === 1;
                container.innerHTML += `
                    <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 shadow-sm shrink-0">
                        <div class="flex justify-between items-center mb-4">
                            <div class="flex items-center gap-2 w-full">
                                <div class="w-3.5 h-3.5 rounded-full shrink-0" style="background-color: ${p.color}"></div>
                                <input type="text" value="${p.name}" oninput="updateVal(${p.id}, 'name', this.value)" class="font-black text-xs outline-none bg-transparent uppercase tracking-tight w-full">
                            </div>
                            ${!isBasePlan ? `<button onclick="removePortfolio(${p.id})" class="text-slate-300 hover:text-red-500 font-bold text-lg ml-2 transition-colors">✕</button>` : ''}
                        </div>
                        <div class="grid grid-cols-4 gap-4">
                            <div class="flex flex-col"><span class="text-[8px] font-black text-slate-400 uppercase mb-1">Start Yr</span>
                                <input type="number" value="${p.startYear}" oninput="updateVal(${p.id}, 'startYear', this.value)" class="bg-white border rounded-lg p-2 text-[10px] font-bold outline-none"></div>
                            <div class="flex flex-col"><span class="text-[8px] font-black text-slate-400 uppercase mb-1">ROI %</span>
                                <input type="number" value="${p.roi}" oninput="updateVal(${p.id}, 'roi', this.value)" class="bg-white border rounded-lg p-2 text-[10px] font-bold outline-none"></div>
                            <div class="flex flex-col"><span class="text-[8px] font-black text-slate-400 uppercase mb-1">Init $</span>
                                <input type="number" value="${p.initial}" oninput="updateVal(${p.id}, 'initial', this.value)" class="bg-white border rounded-lg p-2 text-[10px] font-bold outline-none"></div>
                            <div class="flex flex-col"><span class="text-[8px] font-black text-slate-400 uppercase mb-1">Monthly $</span>
                                <input type="number" value="${p.monthly}" oninput="updateVal(${p.id}, 'monthly', this.value)" class="bg-white border rounded-lg p-2 text-[10px] font-bold outline-none"></div>
                        </div>
                    </div>
                `;
            });
        }

        function updateAll() {
            const maxYears = parseInt(document.getElementById('globalYearsNum').value);
            const goal = parseFloat(document.getElementById('wealthGoal').value) || 0;
            const infRate = (parseFloat(document.getElementById('inflationRate').value) || 0) / 100;
            const useInflation = document.getElementById('inflationToggle').checked;
            
            const tableBody = document.getElementById('summaryTableBody');
            const pieContainer = document.getElementById('pieContainer');
            
            pieCharts.forEach(pc => pc.destroy()); 
            pieCharts = []; 
            tableBody.innerHTML = ''; 
            pieContainer.innerHTML = '';

            let globalPeakWealth = 1; 
            let maxROISeen = 0;
            const onePlusInf = 1 + infRate;

            const datasets = portfolios.map((p) => {
                const dataPoints = [];
                const onePlusR = p.roi > 0 ? Math.pow(1 + (p.roi / 100), 1/12) : 1;
                const r = p.roi > 0 ? onePlusR - 1 : 0;
                let yearReachedGoal = null;
                maxROISeen = Math.max(maxROISeen, p.roi);

                for (let year = 0; year <= maxYears; year++) {
                    if (year < p.startYear) {
                        dataPoints.push({ x: year, y: 0, p: 0 });
                    } else {
                        const months = (year - p.startYear) * 12;
                        const yrsSinceStart = year - p.startYear;
                        let nominal = (r === 0) ? (p.initial + (p.monthly * months)) : ((p.initial * Math.pow(onePlusR, months)) + (p.monthly * ((Math.pow(onePlusR, months) - 1) / r)));
                        let realVal = useInflation ? nominal / Math.pow(onePlusInf, yrsSinceStart) : nominal;
                        
                        dataPoints.push({ x: year, y: realVal, p: p.initial + (p.monthly * months) });
                        if (realVal > globalPeakWealth) globalPeakWealth = realVal;
                        if (yearReachedGoal === null && realVal >= goal) yearReachedGoal = year;
                    }
                }

                const final = dataPoints[dataPoints.length - 1];
                const totalInput = final.p;
                const interestGained = Math.max(0, final.y - totalInput);
                const intProp = final.y > 0 ? ((interestGained / final.y) * 100).toFixed(1) : "0";
                const returnRatio = totalInput > 0 ? ((final.y / totalInput) * 100).toFixed(0) : "0";

                const goalStatus = yearReachedGoal !== null ? `${yearReachedGoal}y` : "—";
                const checkmark = (yearReachedGoal !== null && yearReachedGoal <= maxYears) ? `<span class="ml-2 text-emerald-500">✔</span>` : '';

                tableBody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-5 text-slate-900 uppercase text-[10px]">${p.name}</td>
                        <td class="px-2 py-5 text-center">${Math.max(0, maxYears - p.startYear)}y</td>
                        <td class="px-4 py-5 text-center text-indigo-400">$${interestGained.toLocaleString()} (${intProp}%)</td>
                        <td class="px-4 py-5 text-center text-slate-600">${goalStatus}${checkmark}</td>
                        <td class="px-6 py-5 text-right font-black" style="color: ${p.color}">$${final.y.toLocaleString()}</td>
                        <td class="px-6 py-5 text-right text-emerald-500">${returnRatio}%</td>
                    </tr>
                `;

                // Pie charts in middle column
                const pDiv = document.createElement('div');
                pDiv.className = "flex flex-col items-center shrink-0 w-full mb-2";
                pDiv.innerHTML = `<div class="w-14 h-14 relative"><canvas id="pie-${p.id}"></canvas></div><span class="text-[7px] font-black text-slate-400 mt-1 uppercase tracking-tighter text-center truncate w-full px-2">${p.name}</span>`;
                pieContainer.appendChild(pDiv);
                
                const pc = new Chart(document.getElementById(`pie-${p.id}`).getContext('2d'), {
                    type: 'doughnut',
                    data: { datasets: [{ data: [totalInput, interestGained], backgroundColor: ['#f1f5f9', p.color], borderWidth: 0 }] },
                    options: { cutout: '75%', animation: false, plugins: { tooltip: { enabled: false }, legend: { display: false } } },
                    plugins: [{ id: 'centerText', afterDraw: (chart) => {
                        const { ctx, width, height } = chart;
                        ctx.restore(); ctx.font = "bold 8px Inter"; ctx.textBaseline = "middle"; ctx.fillStyle = p.color;
                        const text = intProp + "%"; const textX = Math.round((width - ctx.measureText(text).width) / 2);
                        const textY = height / 2; ctx.fillText(text, textX, textY); ctx.save();
                    } }]
                });
                pieCharts.push(pc);

                return { label: p.name, data: dataPoints, borderColor: p.color + '99', borderWidth: 3.5, pointRadius: 0, tension: 0.2, finalWealth: final.y, activeYrs: Math.max(0, maxYears - p.startYear), roi: p.roi, color: p.color };
            });

            if (myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('compChart').getContext('2d'), {
                type: 'line',
                data: { datasets: [...datasets, { label: 'Goal', data: [{x:0, y:goal}, {x:maxYears, y:goal}], borderColor: '#cbd5e1', borderDash: [6, 6], borderWidth: 2, pointRadius: 0 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: {
                        x: { type: 'linear', min: 0, max: maxYears },
                        y: { beginAtZero: true, max: globalPeakWealth, ticks: { callback: v => '$' + v.toLocaleString() } }
                    },
                    plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.dataset.label}: $${c.parsed.y.toLocaleString()}` } } }
                }
            });

            if (bubbleChartInstance) bubbleChartInstance.destroy();
            bubbleChartInstance = new Chart(document.getElementById('bubbleChart').getContext('2d'), {
                type: 'bubble',
                data: { datasets: datasets.map(d => ({
                    label: d.label,
                    data: [{ x: d.activeYrs, y: d.roi, r: Math.max(4, Math.sqrt(d.finalWealth / globalPeakWealth) * 40), wealth: d.finalWealth }],
                    backgroundColor: d.color + '66', borderColor: d.color, borderWidth: 1
                })) },
                options: {
                    responsive: true, maintainAspectRatio: false, animation: false,
                    scales: {
                        x: { title: { display: true, text: 'Years Active', font: { size: 9 } }, min: 0, max: maxYears + 20 },
                        y: { title: { display: true, text: 'ROI %', font: { size: 9 } }, min: 0, max: maxROISeen + 10 }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { 
                            callbacks: { 
                                label: function(context) {
                                    const data = context.raw;
                                    const wealthFormatted = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(data.wealth);
                                    return `${context.dataset.label}: ${data.x}yr @ ${data.y}% (Wealth: ${wealthFormatted})`;
                                }
                            } 
                        }
                    }
                }
            });
            saveToStorage();
        }

        loadFromStorage();
        renderControls();
        updateAll();
    </script>
</body>
</html>
